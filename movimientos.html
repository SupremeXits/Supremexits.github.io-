
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movimientos | Supreme Xits</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #000000;
            --neon-green: #00ff88;
            --neon-red: #ff3c3c;
            --card-bg: rgba(10, 10, 10, 0.9);
            --font-futuristic: 'Orbitron', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }
        
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; top:0; left:0; }
        .content { position: relative; z-index: 10; padding: 20px; max-width: 450px; margin: 0 auto; height: 100vh; overflow-y: auto; }

        /* HEADER & NAV */
        .nav-top { margin-bottom: 20px; }
        .btn-volver {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); font-family: var(--font-futuristic); font-size: 10px;
            padding: 8px 15px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 5px rgba(0, 255, 136, 0.2);
        }

        .header-title { text-align: center; margin-bottom: 30px; }
        .header-title i { color: var(--neon-green); font-size: 30px; filter: drop-shadow(0 0 10px var(--neon-green)); }
        .header-title h2 { font-family: var(--font-futuristic); font-size: 16px; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; }

        /* MOVIMIENTOS LIST */
        .supreme-card {
            background: var(--card-bg); border: 1px solid #111; border-radius: 10px;
            padding: 15px; margin-bottom: 10px; border-left: 3px solid var(--neon-green);
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            animation: fadeIn 0.5s ease;
        }
        .card-expense { border-left-color: var(--neon-red); }
        .card-example { border-left-style: dashed; opacity: 0.6; }

        .mov-info { display: flex; flex-direction: column; }
        .mov-item { font-family: var(--font-futuristic); font-size: 10px; color: #eee; text-transform: uppercase; }
        .mov-date { font-size: 9px; color: #555; margin-top: 3px; }
        .amount { font-family: var(--font-futuristic); font-size: 13px; font-weight: 800; }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(4px); align-items: center; justify-content: center;
        }
        .modal-content {
            background: #050505; border: 1px solid var(--neon-green); width: 80%; max-width: 320px;
            padding: 20px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,255,136,0.2);
        }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .detail-label { font-size: 9px; color: #444; text-transform: uppercase; }
        .detail-value { font-size: 11px; color: #fff; font-weight: 600; }
        .btn-cerrar {
            width: 100%; background: var(--neon-green); color: #000; border: none; padding: 10px;
            font-family: var(--font-futuristic); font-size: 10px; font-weight: 900; border-radius: 4px; margin-top: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="content">
        <div class="nav-top">
            <button class="btn-volver" onclick="window.location.href='dashboard.html'">VOLVER</button>
        </div>

        <div class="header-title">
            <i class="fas fa-list-ul"></i>
            <h2>Lista de Movimientos</h2>
            <p style="font-size: 9px; color: #333; letter-spacing: 1px; margin-top: 5px;">SISTEMA DE TICKETS RTDB</p>
        </div>

        <div id="movimientos-container">
            </div>
    </div>

    <div id="modalInfo" class="modal">
        <div class="modal-content">
            <p style="font-family:'Orbitron'; font-size:10px; color:var(--neon-green); margin-bottom:15px; text-align:center;">DATOS DE TRANSACCIÓN</p>
            <div id="modal-body"></div>
            <button class="btn-cerrar" onclick="closeModal()">ENTENDIDO</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCfvk6-vE8iyP-p-RMGBlqmdggjLg1lY7I", 
            authDomain: "sakuritamodz-web.firebaseapp.com", 
            projectId: "sakuritamodz-web", 
            databaseURL: "https://sakuritamodz-web-default-rtdb.firebaseio.com",
            appId: "1:1025154676126:web:caa752670a1be2759d528f" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const dbRT = getDatabase(app);

        // CONFIG DE PARTÍCULAS (Original Supreme)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#00ff88" },
                "opacity": { "value": 0.2 },
                "size": { "value": 1.5 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00ff88", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });

        // CONTROL DE SESIÓN
        onAuthStateChanged(auth, (user) => {
            if (user) { 
                loadHistory(user.uid); 
            } else { 
                setTimeout(() => { if(!auth.currentUser) window.location.href="index.html"; }, 1500); 
            }
        });

        function loadHistory(uid) {
            onValue(ref(dbRT, 'tickets'), (snapshot) => {
                const container = document.getElementById('movimientos-container');
                container.innerHTML = '';
                
                let userTickets = [];
                if(snapshot.exists()){
                    snapshot.forEach(child => {
                        const data = child.val();
                        if(data.uid === uid) userTickets.push(data);
                    });
                }

                if(userTickets.length === 0) {
                    // SI NO HAY NADA, INSERTAMOS EL EJEMPLO
                    renderCard({
                        product: "Ticket de Ejemplo",
                        fecha: "Sin movimientos aún",
                        monto: "0.00",
                        status: "PENDIENTE",
                        category: "SISTEMA",
                        isExample: true
                    }, container);
                } else {
                    // SI HAY DATA, LA MOSTRAMOS (Últimos primero)
                    userTickets.reverse().forEach(ticket => renderCard(ticket, container));
                }
            });
        }

        function renderCard(data, container) {
            const isInc = data.type === "recarga" || data.category === "RECARGA";
            const card = document.createElement('div');
            card.className = `supreme-card ${isInc ? 'card-income' : 'card-expense'} ${data.isExample ? 'card-example' : ''}`;
            
            card.innerHTML = `
                <div class="mov-info">
                    <span class="mov-item">${data.product || data.item}</span>
                    <span class="mov-date">${data.fecha}</span>
                </div>
                <div class="amount" style="color:${isInc ? '#00ff88':'#ff3c3c'}">
                    ${isInc ? '+':'-'}$${parseFloat(data.monto).toFixed(2)}
                </div>
            `;
            
            card.onclick = () => showDetails(data);
            container.appendChild(card);
        }

        window.showDetails = (data) => {
            document.getElementById('modal-body').innerHTML = `
                <div class="detail-row"><span class="detail-label">Producto</span><span class="detail-value">${data.product || data.item}</span></div>
                <div class="detail-row"><span class="detail-label">Monto</span><span class="detail-value">$${data.monto}</span></div>
                <div class="detail-row"><span class="detail-label">Estado</span><span class="detail-value" style="color:#00ff88">${data.status || 'EXITOSO'}</span></div>
                ${data.isExample ? '<p style="font-size:8px; color:#f00; margin-top:10px;">* Este es un ticket de previsualización.</p>' : ''}
            `;
            document.getElementById('modalInfo').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('modalInfo').style.display = 'none';
    </script>
</body>
</html>
