
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movimientos | Supreme Xits</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #000000;
            --neon-green: #00ff88;
            --neon-red: #ff3c3c;
            --neon-yellow: #ffcc00;
            --card-bg: rgba(7, 7, 7, 0.95);
            --font-futuristic: 'Orbitron', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }
        
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; top:0; left:0; pointer-events: none; }
        .content { position: relative; z-index: 10; padding: 20px; max-width: 450px; margin: 0 auto; height: 100vh; overflow-y: auto; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        .nav-top { margin-bottom: 20px; }
        .btn-volver {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); font-family: var(--font-futuristic); font-size: 10px;
            padding: 8px 15px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 5px rgba(0, 255, 136, 0.2);
        }

        .header-title { text-align: center; margin-bottom: 30px; }
        .header-title i { color: var(--neon-green); font-size: 30px; filter: drop-shadow(0 0 10px var(--neon-green)); }
        .header-title h2 { font-family: var(--font-futuristic); font-size: 16px; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; }

        h3 { font-family: var(--font-futuristic); font-size: 10px; color: var(--neon-green); margin: 20px 0 10px 0; letter-spacing: 1px; }

        /* CARDS */
        .supreme-card {
            background: var(--card-bg); border: 1px solid #111; border-radius: 10px;
            padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; 
            align-items: center; cursor: pointer; animation: fadeIn 0.5s ease; border-left: 3px solid #222;
        }
        .card-pending { border-left-color: var(--neon-yellow); opacity: 0.8; }
        .card-income { border-left-color: var(--neon-green); }
        .card-expense { border-left-color: var(--neon-red); }

        .mov-info { display: flex; flex-direction: column; }
        .mov-item { font-family: var(--font-futuristic); font-size: 10px; color: #eee; text-transform: uppercase; }
        .mov-date { font-size: 9px; color: #555; margin-top: 3px; }
        .amount { font-family: var(--font-futuristic); font-size: 13px; font-weight: 800; }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(4px); align-items: center; justify-content: center;
        }
        .modal-content {
            background: #050505; border: 1px solid var(--neon-green); width: 80%; max-width: 320px;
            padding: 20px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,255,136,0.2);
        }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .detail-label { font-size: 9px; color: #444; text-transform: uppercase; }
        .detail-value { font-size: 11px; color: #fff; font-weight: 600; text-align: right; }
        
        .ticket-img-preview { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #222; max-height: 180px; object-fit: contain; }
        
        .btn-cerrar {
            width: 100%; background: var(--neon-green); color: #000; border: none; padding: 10px;
            font-family: var(--font-futuristic); font-size: 10px; font-weight: 900; border-radius: 4px; margin-top: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="content">
        <div class="nav-top">
            <button class="btn-volver" onclick="window.location.href='dashboard.html'">VOLVER</button>
        </div>

        <div class="header-title">
            <i class="fas fa-history"></i>
            <h2>Mis Movimientos</h2>
        </div>

        <div id="sec-pendientes" style="display:none;">
            <h3>🕒 En Revisión</h3>
            <div id="list-pendientes"></div>
        </div>

        <div id="sec-historial">
            <h3>📊 Historial</h3>
            <div id="list-historial">
                <p style="text-align:center; font-size:9px; color:#222; margin-top:20px;">SIN ACTIVIDAD</p>
            </div>
        </div>
    </div>

    <div id="modalInfo" class="modal">
        <div class="modal-content">
            <p style="font-family:'Orbitron'; font-size:10px; color:var(--neon-green); margin-bottom:15px; text-align:center; letter-spacing:2px;">LOG DATA</p>
            <div id="modal-body"></div>
            <button class="btn-cerrar" onclick="closeModal()">CERRAR</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCfvk6-vE8iyP-p-RMGBlqmdggjLg1lY7I", 
            authDomain: "sakuritamodz-web.firebaseapp.com", 
            projectId: "sakuritamodz-web", 
            databaseURL: "https://sakuritamodz-web-default-rtdb.firebaseio.com",
            appId: "1:1025154676126:web:caa752670a1be2759d528f" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const dbRT = getDatabase(app);

        // CONFIG DE PARTÍCULAS (Supreme Original)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#00ff88" },
                "opacity": { "value": 0.2 },
                "size": { "value": 1.5 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00ff88", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) { loadAllData(user.uid); } 
            else { window.location.href="index.html"; }
        });

        function loadAllData(uid) {
            // 1. Pendientes
            onValue(ref(dbRT, 'tickets_recarga'), (snap) => {
                const list = document.getElementById('list-pendientes');
                list.innerHTML = '';
                let count = 0;
                snap.forEach(c => {
                    const d = c.val();
                    if(d.uid === uid) {
                        count++;
                        list.innerHTML += renderCard(d, 'card-pending');
                    }
                });
                document.getElementById('sec-pendientes').style.display = count > 0 ? 'block' : 'none';
            });

            // 2. Historial (Aprobados y Compras)
            onValue(ref(dbRT), (snap) => {
                const list = document.getElementById('list-historial');
                list.innerHTML = '';
                let logs = [];

                if(snap.child('tickets_aprobados').exists()){
                    snap.child('tickets_aprobados').forEach(c => {
                        const d = c.val();
                        if(d.uid === uid) logs.push({...d, type: 'in'});
                    });
                }
                if(snap.child('compras').exists()){
                    snap.child('compras').forEach(c => {
                        const d = c.val();
                        if(d.uid === uid) logs.push({...d, type: 'out'});
                    });
                }

                if(logs.length === 0) {
                    list.innerHTML = "<p style='text-align:center; font-size:9px; color:#222; margin-top:20px;'>SIN ACTIVIDAD</p>";
                } else {
                    logs.sort((a,b) => (b.timestamp_admin || 0) - (a.timestamp_admin || 0));
                    logs.forEach(l => list.innerHTML += renderCard(l, l.type === 'in' ? 'card-income' : 'card-expense'));
                }
            });
        }

        function renderCard(d, cl) {
            const isOut = cl === 'card-expense';
            const sym = cl === 'card-pending' ? '' : (isOut ? '-' : '+');
            const col = cl === 'card-pending' ? 'var(--neon-yellow)' : (isOut ? 'var(--neon-red)' : 'var(--neon-green)');
            const dataStr = btoa(JSON.stringify(d));

            return `
                <div class="supreme-card ${cl}" onclick="showDetails('${dataStr}')">
                    <div class="mov-info">
                        <span class="mov-item">${d.metodo || d.producto || 'TRANSACCIÓN'}</span>
                        <span class="mov-date">${d.fecha || 'Procesado'}</span>
                    </div>
                    <div class="amount" style="color:${col}">${sym}$${parseFloat(d.monto).toFixed(2)}</div>
                </div>`;
        }

        window.showDetails = (encoded) => {
            const d = JSON.parse(atob(encoded));
            document.getElementById('modal-body').innerHTML = `
                <div class="detail-row"><span class="detail-label">Producto/Método</span><span class="detail-value">${d.metodo || d.producto}</span></div>
                <div class="detail-row"><span class="detail-label">Referencia</span><span class="detail-value">${d.referencia || 'N/A'}</span></div>
                <div class="detail-row"><span class="detail-label">Monto</span><span class="detail-value">$${d.monto} USD</span></div>
                ${d.img ? `<img src="${d.img}" class="ticket-img-preview" onclick="window.open(this.src)">` : ''}
            `;
            document.getElementById('modalInfo').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('modalInfo').style.display = 'none';
    </script>
</body>
</html>
