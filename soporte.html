
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAKURITA SUPPORT V33 | SUPREME XITS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-blue: #00d9ff;
            --neon-glow: rgba(0, 255, 136, 0.4);
            --blue-glow: rgba(0, 217, 255, 0.4);
            --bg-dark: #000000;
            --glass: rgba(10, 15, 15, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background-color: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; width: 100%; overflow: hidden; }
        
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* --- LOGIN --- */
        #soporte-login { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .login-card { width: 100%; max-width: 380px; background: var(--glass); padding: 45px 30px; border-radius: 25px; border: 1px solid var(--neon-green); text-align: center; box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); z-index: 2001; backdrop-filter: blur(15px); animation: fadeIn 0.8s ease; }
        .header-icon { width: 75px; height: 75px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; border: 2px solid var(--neon-green); box-shadow: 0 0 20px var(--neon-glow); }
        .header-icon i { font-size: 35px; color: var(--neon-green); filter: drop-shadow(0 0 5px var(--neon-green)); }
        .subtitle { font-size: 13px; color: #bdc3c7; line-height: 1.6; margin-bottom: 35px; font-weight: 500; }
        .input-box { position: relative; margin-bottom: 25px; }
        .input-box input { width: 100%; background: rgba(0, 0, 0, 0.6); border: 1px solid #222; padding: 16px 15px 16px 45px; border-radius: 15px; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 13px; outline: none; transition: 0.4s; letter-spacing: 1px; border-bottom: 2px solid var(--neon-green); }
        .input-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--neon-green); font-size: 18px; }

        .btn-main { background: var(--neon-green); border: none; width: 100%; padding: 18px; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; color: #000; box-shadow: 0 0 20px var(--neon-glow); margin-bottom: 15px; }
        .btn-back { background: transparent; border: 1px solid var(--neon-green); width: 100%; padding: 15px; border-radius: 15px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; color: var(--neon-green); font-size: 12px; }

        /* --- INTERFAZ CHAT --- */
        #soporte-interface { display: none; flex-direction: column; height: 100vh; z-index: 5; position: relative; }
        .chat-header { padding: 12px 15px; background: var(--glass); border: 1px solid var(--neon-green); border-radius: 20px; display: flex; align-items: center; justify-content: space-between; margin: 15px; box-shadow: 0 0 15px var(--neon-glow); z-index: 10; }
        
        /* AJUSTE: Más padding superior (35px) y padding inferior para barra móvil */
        #chat-box { flex: 1; overflow-y: auto; padding: 35px 20px 20px 20px; display: flex; flex-direction: column; gap: 12px; padding-bottom: calc(140px + env(safe-area-inset-bottom)); scroll-behavior: smooth; position: relative; z-index: 5; }
        
        .msg { position: relative; padding: 12px 16px; font-size: 14px; max-width: 85%; border-radius: 18px; animation: fadeIn 0.3s ease; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: var(--neon-green); color: #000; font-weight: 600; border-bottom-right-radius: 2px; }
        .msg.admin { align-self: flex-start; background: var(--neon-blue); color: #000; font-weight: 600; border-bottom-left-radius: 2px; }

        /* AUDIO WHATSAPP STYLE */
        .audio-player { display: flex; align-items: center; gap: 12px; min-width: 210px; padding: 5px 0; }
        .play-btn { width: 38px; height: 38px; border-radius: 50%; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .audio-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .progress-container { width: 100%; height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; }
        .progress-bar { height: 100%; background: #000; width: 0%; border-radius: 2px; transition: width 0.1s linear; }
        .audio-meta { display: flex; justify-content: space-between; font-size: 10px; font-family: 'Orbitron'; opacity: 0.8; }

        /* MENÚS */
        #attach-menu, #emoji-menu { position: absolute; bottom: calc(85px + env(safe-area-inset-bottom)); background: #080808; border: 1px solid var(--neon-green); border-radius: 20px; display: none; padding: 15px; z-index: 200; animation: popUp 0.3s ease; }
        #attach-menu { left: 15px; flex-direction: row; gap: 20px; }
        #emoji-menu { right: 15px; width: 250px; height: 300px; grid-template-columns: repeat(5, 1fr); gap: 10px; overflow-y: auto; text-align: center; }
        .emoji-opt { font-size: 24px; cursor: pointer; padding: 5px; border-radius: 5px; }
        .emoji-opt:hover { background: rgba(0, 255, 136, 0.2); }

        .bottom-area { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 10px 10px calc(25px + env(safe-area-inset-bottom)) 10px; z-index: 100; border-top: 1px solid rgba(0, 255, 136, 0.1); }
        .bottom-container { display: flex; align-items: center; gap: 8px; }
        .input-wrapper { flex: 1; background: var(--glass); border: 1px solid rgba(0, 255, 136, 0.3); border-radius: 25px; display: flex; align-items: center; padding: 0 12px; height: 48px; }
        #input-msg { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; outline: none; font-size: 15px; }
        .circle-btn { width: 48px; height: 48px; background: var(--neon-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; flex-shrink: 0; }
        .circle-btn.recording { background: #ff3131; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes popUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; } }
    </style>
</head>
<body onclick="closeAllMenus()">

    <div id="particles-js"></div>

    <div id="soporte-login">
        <div class="login-card">
            <div class="header-icon"><i class="fas fa-headset"></i></div>
            <h1 style="font-family:'Orbitron'; font-size: 18px; color: var(--neon-green); margin-bottom: 15px;">SUPREME SUPPORT V33</h1>
            <p class="subtitle">Accede al chat de soporte encargado de atender tus dudas.</p>
            <div class="input-box">
                <i class="fas fa-barcode"></i>
                <input type="text" id="input-ticket" placeholder="CÓDIGO DE TICKET" spellcheck="false">
            </div>
            <button class="btn-main" onclick="validarTicket()">ACCEDER</button>
            <button class="btn-back" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> VOLVER AL DASHBOARD</button>
            <p id="error-ticket" style="color:#ff3131; font-size:11px; margin-top:15px; display:none; font-family:'Orbitron';">TICKET INVÁLIDO</p>
        </div>
    </div>

    <div id="soporte-interface">
        <header class="chat-header">
            <button onclick="window.location.reload()" style="background:none; border:none; color:var(--neon-green); font-size:18px;"><i class="fas fa-arrow-left"></i></button>
            <div style="text-align:center;">
                <p id="display-ticket" style="font-family:'Orbitron'; font-size:9px; color:var(--neon-green);">CONEXIÓN SEGURA</p>
                <p id="session-timer" style="font-size:11px; font-weight:bold;">00:00</p>
            </div>
            <div style="width:10px; height:10px; border-radius:50%; background:var(--neon-green);"></div>
        </header>

        <div id="chat-box"></div>

        <div id="attach-menu">
            <div onclick="document.getElementById('file-img').click()" style="background:#bf59ff; width:45px; height:45px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;"><i class="fas fa-image"></i></div>
            <div onclick="toggleGrabacion()" style="background:#ff5959; width:45px; height:45px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;"><i class="fas fa-microphone"></i></div>
        </div>

        <div id="emoji-menu">
            <span class="emoji-opt" onclick="addEmoji('😔')">😔</span><span class="emoji-opt" onclick="addEmoji('😎')">😎</span>
            <span class="emoji-opt" onclick="addEmoji('🔥')">🔥</span><span class="emoji-opt" onclick="addEmoji('✅')">✅</span>
            <span class="emoji-opt" onclick="addEmoji('⚠️')">⚠️</span><span class="emoji-opt" onclick="addEmoji('🚀')">🚀</span>
            <span class="emoji-opt" onclick="addEmoji('😂')">😂</span><span class="emoji-opt" onclick="addEmoji('❤️')">❤️</span>
            <span class="emoji-opt" onclick="addEmoji('😍')">😍</span><span class="emoji-opt" onclick="addEmoji('✨')">✨</span>
            <span class="emoji-opt" onclick="addEmoji('💎')">💎</span><span class="emoji-opt" onclick="addEmoji('💪')">💪</span>
            <span class="emoji-opt" onclick="addEmoji('🤝')">🤝</span><span class="emoji-opt" onclick="addEmoji('🤔')">🤔</span>
            <span class="emoji-opt" onclick="addEmoji('💀')">💀</span><span class="emoji-opt" onclick="addEmoji('👾')">👾</span>
            <span class="emoji-opt" onclick="addEmoji('🤖')">🤖</span><span class="emoji-opt" onclick="addEmoji('⚡')">⚡</span>
            <span class="emoji-opt" onclick="addEmoji('👀')">👀</span><span class="emoji-opt" onclick="addEmoji('💸')">💸</span>
        </div>

        <div class="bottom-area">
            <div class="bottom-container">
                <div class="input-wrapper">
                    <i class="fas fa-plus-circle" style="color:var(--neon-green); font-size:20px; cursor:pointer;" onclick="toggleAttachMenu(event)"></i>
                    <input type="text" id="input-msg" placeholder="Escribe aquí...">
                    <i class="fas fa-smile" style="color:var(--neon-green); font-size:22px; cursor:pointer;" onclick="toggleEmojiMenu(event)"></i>
                    <input type="file" id="file-img" hidden accept="image/*" onchange="enviarImagen()">
                    <div id="rec-ui" style="display:none; color:#ff3131; font-family:'Orbitron'; font-size:10px; align-items:center; gap:5px; margin-left:10px;">
                        <i class="fas fa-circle" style="animation: pulse 0.5s infinite;"></i> <span id="rec-timer">0:00</span>
                    </div>
                </div>
                <button class="circle-btn" id="main-btn" onclick="handleAction()"><i class="fas fa-paper-plane" id="btn-icon" style="color:#000; font-size:18px;"></i></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCfvk6-vE8iyP-p-RMGBlqmdggjLg1lY7I", databaseURL: "https://sakuritamodz-web-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);
        let activeTicket = null, mediaRecorder, audioChunks = [], isRecording = false, recInt;

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 70, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00ff88" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 1.5, "random": true },
                "line_linked": { "enable": true, "distance": 120, "color": "#00ff88", "opacity": 0.15, "width": 1 },
                "move": { "enable": true, "speed": 1.2 }
            }
        });

        window.validarTicket = async () => {
            const id = document.getElementById('input-ticket').value.trim().toUpperCase();
            if(!id) return;
            const snap = await get(child(ref(db), `tickets_pendientes/${id}`));
            if(snap.exists()){
                activeTicket = id;
                document.getElementById('soporte-login').style.display = 'none';
                document.getElementById('soporte-interface').style.display = 'flex';
                iniciarSync(id);
            } else { document.getElementById('error-ticket').style.display = 'block'; }
        };

        function iniciarSync(id) {
            let t = 1800; setInterval(() => { t--; let m = Math.floor(t/60), s = t % 60; document.getElementById('session-timer').innerText = `${m}:${s < 10 ? '0'+s : s}`; }, 1000);
            onValue(ref(db, `soporte/mensajes/${id}`), snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = '';
                snap.forEach(cs => {
                    const m = cs.val(); const div = document.createElement('div');
                    div.className = `msg ${m.sender}`;
                    if(m.type === 'audio') {
                        const uid = `aud-${Date.now()}-${Math.random().toString(36).substr(2,4)}`;
                        div.innerHTML = `<div class="audio-player" id="${uid}"><button class="play-btn" onclick="playAudio('${uid}', '${m.msg}')"><i class="fas fa-play"></i></button><div class="audio-info"><div class="progress-container"><div class="progress-bar"></div></div><div class="audio-meta"><span class="timer">0:00</span><i class="fas fa-microphone"></i></div></div></div>`;
                    } else if(m.type === 'image') {
                        div.innerHTML = `<img src="${m.msg}" style="width:100%; border-radius:12px;" onclick="window.open('${m.msg}')">`;
                    } else { div.innerHTML = `<span>${m.msg}</span>`; }
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.playAudio = (cid, url) => {
            const cont = document.getElementById(cid); const aud = new Audio(url);
            const btn = cont.querySelector('i'); const bar = cont.querySelector('.progress-bar');
            const txt = cont.querySelector('.timer');
            if(btn.classList.contains('fa-pause')) return;
            btn.className = 'fas fa-pause'; aud.play();
            aud.ontimeupdate = () => {
                bar.style.width = (aud.currentTime/aud.duration)*100 + '%';
                let s = Math.floor(aud.currentTime%60); txt.innerText = `0:${s<10?'0'+s:s}`;
            };
            aud.onended = () => { btn.className = 'fas fa-play'; bar.style.width = '0%'; txt.innerText = '0:00'; };
        };

        window.toggleGrabacion = async () => {
            if(!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const r = new FileReader(); r.onloadend = () => push(ref(db, `soporte/mensajes/${activeTicket}`), { sender:'user', msg:r.result, type:'audio', time:Date.now() });
                    r.readAsDataURL(blob);
                };
                mediaRecorder.start(); startRecUI();
            } else { mediaRecorder.stop(); stopRecUI(); }
        };

        function startRecUI() { isRecording = true; let s = 0; document.getElementById('rec-ui').style.display = 'flex'; document.getElementById('input-msg').style.display = 'none'; document.getElementById('main-btn').classList.add('recording'); document.getElementById('btn-icon').className = 'fas fa-stop'; recInt = setInterval(() => { s++; document.getElementById('rec-timer').innerText = `0:${s < 10 ? '0'+s : s}`; }, 1000); }
        function stopRecUI() { isRecording = false; clearInterval(recInt); document.getElementById('rec-ui').style.display = 'none'; document.getElementById('input-msg').style.display = 'block'; document.getElementById('main-btn').classList.remove('recording'); document.getElementById('btn-icon').className = 'fas fa-paper-plane'; }
        
        window.handleAction = () => {
            const input = document.getElementById('input-msg');
            if(isRecording) { toggleGrabacion(); return; }
            if(!input.value.trim()) return;
            push(ref(db, `soporte/mensajes/${activeTicket}`), { sender:'user', msg:input.value, type:'text', time:Date.now() });
            input.value = '';
        };

        window.enviarImagen = () => { const f = document.getElementById('file-img').files[0]; const r = new FileReader(); r.onload = e => push(ref(db, `soporte/mensajes/${activeTicket}`), { sender:'user', msg:e.target.result, type:'image', time:Date.now() }); r.readAsDataURL(f); };
        window.toggleAttachMenu = (e) => { e.stopPropagation(); const m = document.getElementById('attach-menu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };
        window.toggleEmojiMenu = (e) => { e.stopPropagation(); const s = document.getElementById('emoji-menu'); s.style.display = s.style.display === 'grid' ? 'none' : 'grid'; };
        window.closeAllMenus = () => { document.getElementById('attach-menu').style.display = 'none'; document.getElementById('emoji-menu').style.display = 'none'; };
        window.addEmoji = (em) => { document.getElementById('input-msg').value += em; };
    </script>
</body>
</html>
